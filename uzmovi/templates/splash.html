{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avto Service</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      transition: opacity 0.6s ease;
      background: radial-gradient(circle at 50% 40%, #1b2230 0%, #0d1117 70%, #05070a 100%);
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    body.fade-out { opacity: 0; }

    /* Fon zarrachalari */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      bottom: -10px;
      width: 4px;
      height: 4px;
      background: rgba(56, 189, 248, 0.6);
      border-radius: 50%;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    /* Logo aylana yorug'lik effekti */
    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 220px;
    }
    .logo-glow {
      position: absolute;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.5) 0%, rgba(129,140,248,0.15) 55%, rgba(56,189,248,0) 75%);
      animation: pulseGlow 2s ease-in-out infinite;
      filter: blur(3px);
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.9); opacity: 0.6; }
      50%      { transform: scale(1.2); opacity: 1; }
    }

    /* Aylanuvchi orbit halqalar */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
    }
    .ring-1 {
      width: 200px;
      height: 200px;
      border-top-color: #38bdf8;
      border-right-color: #38bdf8;
      animation: spin 2.2s linear infinite;
      opacity: 0.8;
    }
    .ring-2 {
      width: 170px;
      height: 170px;
      border-bottom-color: #818cf8;
      border-left-color: #818cf8;
      animation: spinReverse 3s linear infinite;
      opacity: 0.6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spinReverse { to { transform: rotate(-360deg); } }

    .logo {
      position: relative;
      z-index: 2;
      animation: logoShake 1s ease-in-out forwards, floatLogo 3s ease-in-out 1s infinite;
      transform-origin: center;
      box-shadow: 0 0 25px rgba(56,189,248,0.5), 0 0 60px rgba(56,189,248,0.25);
    }

    @keyframes logoShake {
      0%   { transform: scale(0) rotate(0deg); opacity: 0; }
      40%  { transform: scale(1.15) rotate(8deg); opacity: 1; }
      60%  { transform: scale(0.95) rotate(-5deg); }
      80%  { transform: scale(1.05) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* Brend nomi */
    .brand-title {
      letter-spacing: 0.35em;
      background: linear-gradient(90deg, #38bdf8, #818cf8, #38bdf8);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 2.5s linear infinite, fadeInUp 0.8s ease-out 0.6s both;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      animation: fadeInUp 0.8s ease-out 0.9s both;
      color: #64748b;
    }

    /* Status matni animatsiyasi (uch nuqta) */
    .dots span {
      animation: dotBlink 1.4s infinite;
      opacity: 0;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBlink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    /* Yuklanish progress bar */
    .progress-track {
      width: 220px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out 1.1s both;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      animation: loadBar 2.5s ease-in-out forwards;
      box-shadow: 0 0 10px rgba(56,189,248,0.7);
    }
    @keyframes loadBar {
      0%   { width: 0%; }
      100% { width: 100%; }
    }

    @media (max-width: 640px) {
      .logo { width: 6rem !important; height: 6rem !important; }
      .logo-wrap { width: 170px; height: 170px; }
      .logo-glow { width: 140px; height: 140px; }
      .ring-1 { width: 150px; height: 150px; }
      .ring-2 { width: 125px; height: 125px; }
      .brand-title { letter-spacing: 0.2em; font-size: 1.5rem; }
    }
  </style>

  <script>
    setTimeout(() => {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.replace("{% url 'index' %}");
      }, 600);
    }, 2500);

    window.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('.particles');
      const count = 25;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (3 + Math.random() * 4) + 's';
        p.style.animationDelay = (Math.random() * 4) + 's';
        p.style.opacity = 0.3 + Math.random() * 0.7;
        container.appendChild(p);
      }
    });
  </script>
</head>

<body class="flex flex-col items-center justify-center h-screen relative">

  <div class="particles"></div>

  <!-- Logo va brend -->
  <div class="flex flex-col items-center gap-6">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <img src="https://logos.telegram-store.com/channels/uzmovi-comn1/telegram_logo.jpg"
           class="logo w-32 h-32 rounded-full object-cover border-2 border-sky-400/40" alt="Uzmovi Logo">
    </div>

    <h1 class="brand-title text-3xl md:text-4xl font-extrabold uppercase">Uzmovi</h1>
    <p class="subtitle text-sm md:text-base tracking-wide">
      Yuklanmoqda<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </p>

    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>
  </div>

</body>
</html>
